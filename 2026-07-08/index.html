<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Dónde comemos en CDMX? 🌮</title>
  <style>
    :root {
      --bg: #fff8f0;
      --card: #ffffff;
      --ink: #2b2118;
      --muted: #8a7a68;
      --accent: #e8552d;
      --accent-2: #f2a900;
      --line: #f0e4d4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1b1712;
        --card: #241e18;
        --ink: #f4ece0;
        --muted: #b09c86;
        --accent: #ff7a52;
        --accent-2: #ffc23d;
        --line: #362d24;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      padding: 1.5rem 1rem 4rem;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 1.5rem; }
    h1 { font-size: 1.8rem; margin: 0 0 .25rem; }
    header p { color: var(--muted); margin: 0; }
    .result {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-radius: 18px;
      padding: 1.75rem 1rem;
      text-align: center;
      margin-bottom: 1.25rem;
      min-height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(232, 85, 45, .25);
    }
    .result.spin { animation: pop .4s ease; }
    @keyframes pop { 0% { transform: scale(.9); opacity: .4; } 100% { transform: scale(1); opacity: 1; } }
    button {
      font: inherit;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      padding: .7rem 1rem;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .decide {
      width: 100%;
      background: var(--accent);
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .decide:active { transform: translateY(1px); }
    .add { display: flex; gap: .5rem; margin-bottom: 1rem; }
    .add input {
      flex: 1;
      font: inherit;
      padding: .7rem .8rem;
      border: 2px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      color: var(--ink);
    }
    .add button { background: var(--accent-2); color: #2b2118; font-weight: 700; }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: .7rem .9rem;
      margin-bottom: .5rem;
    }
    li .name { font-weight: 600; }
    li button {
      background: transparent;
      color: var(--muted);
      font-size: 1.2rem;
      padding: .1rem .5rem;
    }
    .empty { color: var(--muted); text-align: center; padding: 1rem; }
    footer { text-align: center; color: var(--muted); font-size: .85rem; margin-top: 2rem; }

    /* Selector de modo: dos botones que se ven como pestañas */
    .modes { display: flex; gap: .5rem; margin-bottom: 1rem; }
    .modes button {
      flex: 1;
      background: var(--card);
      color: var(--muted);
      border: 2px solid var(--line);
      font-weight: 600;
    }
    .modes button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* En modo votación, cada lugar muestra su contador y un botón "Votar" */
    li .count {
      min-width: 1.6rem;
      text-align: center;
      font-weight: 700;
      color: var(--accent);
    }
    li .vote {
      background: var(--accent-2);
      color: #2b2118;
      font-size: .9rem;
      font-weight: 700;
      padding: .35rem .8rem;
    }
    li .actions { display: flex; align-items: center; gap: .5rem; }
    .reset {
      width: 100%;
      background: transparent;
      color: var(--muted);
      border: 2px dashed var(--line);
      margin-top: .5rem;
    }

    /* Registro de usuarios */
    section.users { margin-bottom: 1.5rem; }
    section.users h2 {
      font-size: 1rem;
      color: var(--muted);
      margin: 0 0 .5rem;
    }
    .chips { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .6rem; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: .4rem .5rem .4rem .9rem;
      font-weight: 600;
    }
    .chip button {
      background: transparent;
      color: var(--muted);
      padding: 0 .3rem;
      line-height: 1;
    }
    .voter-picker { margin-bottom: 1rem; }
    .voter-picker p { margin: 0 0 .5rem; color: var(--muted); font-size: .9rem; }
    .voter-chip {
      border: 2px solid var(--line);
      background: var(--card);
      color: var(--ink);
      border-radius: 999px;
      padding: .5rem 1rem;
      font-weight: 600;
    }
    .voter-chip.picked { background: var(--accent); border-color: var(--accent); color: #fff; }
    .voter-chip.done { opacity: .55; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>¿Dónde comemos en CDMX? 🌮</h1>
      <p>Propongan lugares y dejen que la app decida.</p>
    </header>

    <section class="users">
      <h2>👥 ¿Quién viene?</h2>
      <form class="add" id="userForm">
        <input id="userInput" placeholder="Tu nombre…" autocomplete="off" />
        <button type="submit">Registrarse</button>
      </form>
      <div class="chips" id="userChips"></div>
    </section>

    <div class="modes">
      <button id="modeRandom" class="active">🎲 Al azar</button>
      <button id="modeVote">🗳️ Votación</button>
    </div>

    <div class="result" id="result">Presiona «¡Decide por mí!»</div>

    <button class="decide" id="decide">🎲 ¡Decide por mí!</button>
    <button class="decide" id="winner" hidden>🏆 Ver ganador</button>
    <button class="reset" id="resetVotes" hidden>Reiniciar votos</button>

    <div class="voter-picker" id="voterPicker" hidden>
      <p>¿Quién vota ahora?</p>
      <div class="chips" id="voterChips"></div>
    </div>

    <form class="add" id="addForm">
      <input id="addInput" placeholder="Agregar un lugar…" autocomplete="off" />
      <button type="submit">Agregar</button>
    </form>

    <ul id="list"></ul>

    <footer>Coding Dojo · 8 de julio de 2026 · CDMX</footer>
  </div>

  <script type="module">
    import {
      addPlace,
      addUser,
      castVote,
      pickRandom,
      removePlace,
      removeUser,
      tallyVotes,
      topChoices,
      votedFor,
    } from "./decide.js";

    const PLACES_KEY = "cdmx-lugares";
    const USERS_KEY = "cdmx-usuarios";
    const SEED = [
      "Tacos al pastor",
      "Pozole",
      "Tortas",
      "Sushi",
      "Pizza",
      "Ramen",
    ];

    // --- ESTADO ---
    // places:       la lista de lugares (persistida en localStorage).
    // users:        la lista de personas registradas (persistida en localStorage).
    // mode:         "random" (elige al azar) o "vote" (votación).
    // votes:        mapa { usuario: lugar }, un voto por persona.
    //               Es la única fuente de verdad de la votación.
    // currentVoter: quién está votando ahora mismo (elegido con un chip).
    // runoffPlaces: si hay empate, solo estos lugares son votables (segunda
    //               ronda). null = se vota entre todos los lugares.
    let places = loadList(PLACES_KEY, SEED);
    let users = loadList(USERS_KEY, []);
    let mode = "random";
    let votes = {};
    let currentVoter = null;
    let runoffPlaces = null;

    // --- REFERENCIAS AL DOM ---
    const listEl = document.getElementById("list");
    const resultEl = document.getElementById("result");
    const form = document.getElementById("addForm");
    const input = document.getElementById("addInput");
    const decideBtn = document.getElementById("decide");
    const winnerBtn = document.getElementById("winner");
    const resetBtn = document.getElementById("resetVotes");
    const modeRandomBtn = document.getElementById("modeRandom");
    const modeVoteBtn = document.getElementById("modeVote");
    const userForm = document.getElementById("userForm");
    const userInput = document.getElementById("userInput");
    const userChipsEl = document.getElementById("userChips");
    const voterPickerEl = document.getElementById("voterPicker");
    const voterChipsEl = document.getElementById("voterChips");

    function loadList(key, fallback) {
      try {
        const saved = JSON.parse(localStorage.getItem(key));
        return Array.isArray(saved) && saved.length ? saved : [...fallback];
      } catch {
        return [...fallback];
      }
    }

    function savePlaces() {
      localStorage.setItem(PLACES_KEY, JSON.stringify(places));
    }

    function saveUsers() {
      localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }

    // Dibuja la lista de lugares. En modo votación muestra contador + "Votar";
    // en modo azar muestra el botón para quitar el lugar.
    // Si hay una ronda de desempate en curso, solo se listan los empatados.
    function render() {
      listEl.innerHTML = "";

      const votablePlaces = mode === "vote" && runoffPlaces ? runoffPlaces : places;

      if (votablePlaces.length === 0) {
        const li = document.createElement("li");
        li.className = "empty";
        li.textContent = "No hay lugares. ¡Agreguen uno!";
        listEl.appendChild(li);
        return;
      }

      // Contamos los votos una sola vez, reusando la lógica ya probada.
      // votes es { usuario: lugar }; a tallyVotes le basta la lista de lugares elegidos.
      const { counts } = tallyVotes(Object.values(votes));

      for (const place of votablePlaces) {
        const li = document.createElement("li");

        const name = document.createElement("span");
        name.className = "name";
        name.textContent = place;

        const actions = document.createElement("div");
        actions.className = "actions";

        if (mode === "vote") {
          // Contador de votos de este lugar (0 si nadie lo ha votado).
          const count = document.createElement("span");
          count.className = "count";
          count.textContent = counts[place] ?? 0;

          const voteBtn = document.createElement("button");
          voteBtn.className = "vote";
          voteBtn.textContent = "Votar";
          voteBtn.disabled = !currentVoter;
          voteBtn.addEventListener("click", () => {
            if (!currentVoter) {
              showResult("Selecciona quién eres arriba 👆");
              return;
            }
            votes = castVote(votes, currentVoter, place);
            renderVoterChips();
            render();
          });

          actions.append(count, voteBtn);
        } else {
          // Modo azar: botón para quitar el lugar.
          const del = document.createElement("button");
          del.textContent = "✕";
          del.setAttribute("aria-label", `Quitar ${place}`);
          del.addEventListener("click", () => {
            places = removePlace(places, place);
            savePlaces();
            render();
          });
          actions.append(del);
        }

        li.append(name, actions);
        listEl.appendChild(li);
      }
    }

    // Dibuja los chips de personas registradas (siempre visibles).
    function renderUsers() {
      userChipsEl.innerHTML = "";
      for (const user of users) {
        const chip = document.createElement("span");
        chip.className = "chip";

        const name = document.createElement("span");
        name.textContent = user;

        const del = document.createElement("button");
        del.textContent = "✕";
        del.setAttribute("aria-label", `Quitar a ${user}`);
        del.addEventListener("click", () => {
          users = removeUser(users, user);
          if (currentVoter === user) currentVoter = null;
          saveUsers();
          renderUsers();
          renderVoterChips();
        });

        chip.append(name, del);
        userChipsEl.appendChild(chip);
      }
    }

    // Dibuja los chips "¿quién vota ahora?" (solo en modo votación).
    function renderVoterChips() {
      voterChipsEl.innerHTML = "";

      if (users.length === 0) {
        const empty = document.createElement("span");
        empty.className = "empty";
        empty.textContent = "Regístrense arriba primero";
        voterChipsEl.appendChild(empty);
        return;
      }

      for (const user of users) {
        const chip = document.createElement("button");
        chip.className = "voter-chip";
        const already = votedFor(votes, user);
        if (user === currentVoter) chip.classList.add("picked");
        if (already) chip.classList.add("done");
        chip.textContent = already ? `${user} ✓` : user;

        chip.addEventListener("click", () => {
          currentVoter = user;
          renderVoterChips();
          render();
        });

        voterChipsEl.appendChild(chip);
      }
    }

    // Anima el recuadro de resultado y muestra un texto.
    function showResult(text) {
      resultEl.classList.remove("spin");
      void resultEl.offsetWidth; // truco para reiniciar la animación CSS
      resultEl.classList.add("spin");
      resultEl.textContent = text;
    }

    // "A, B y C" — formato de lista en español, para anunciar los empatados.
    function formatList(items) {
      if (items.length <= 1) return items[0] ?? "";
      if (items.length === 2) return `${items[0]} y ${items[1]}`;
      return `${items.slice(0, -1).join(", ")} y ${items[items.length - 1]}`;
    }

    // Cambia de modo y ajusta qué botones se ven.
    function setMode(next) {
      mode = next;
      const isVote = mode === "vote";

      modeVoteBtn.classList.toggle("active", isVote);
      modeRandomBtn.classList.toggle("active", !isVote);

      decideBtn.hidden = isVote;
      winnerBtn.hidden = !isVote;
      resetBtn.hidden = !isVote;
      voterPickerEl.hidden = !isVote;

      showResult(isVote ? "Voten y presiona «Ver ganador»" : "Presiona «¡Decide por mí!»");
      if (isVote) renderVoterChips();
      render();
    }

    // --- EVENTOS ---

    // Registrar un usuario nuevo.
    userForm.addEventListener("submit", (e) => {
      e.preventDefault();
      users = addUser(users, userInput.value);
      userInput.value = "";
      saveUsers();
      renderUsers();
      renderVoterChips();
      userInput.focus();
    });

    // Agregar un lugar nuevo.
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      places = addPlace(places, input.value);
      input.value = "";
      savePlaces();
      render();
      input.focus();
    });

    // Modo azar: elige uno al azar.
    decideBtn.addEventListener("click", () => {
      const pick = pickRandom(places);
      showResult(pick ? `👉 ${pick}` : "Agreguen lugares primero");
    });

    // Modo votación: si hay empate, abre una ronda de desempate SOLO entre
    // los lugares empatados (nadie gana al azar; se vuelve a preguntar).
    winnerBtn.addEventListener("click", () => {
      const { winner, tie, counts } = tallyVotes(Object.values(votes));

      if (!winner) {
        showResult("Nadie ha votado todavía 🗳️");
        return;
      }

      if (tie) {
        runoffPlaces = topChoices(counts);
        votes = {};
        currentVoter = null;
        showResult(`🤝 Empate entre ${formatList(runoffPlaces)} — ¡vuelvan a votar!`);
        renderVoterChips();
        render();
        return;
      }

      showResult(`🏆 ${winner}`);
    });

    // Reiniciar los votos y volver a votar entre TODOS los lugares
    // (los usuarios registrados se quedan).
    resetBtn.addEventListener("click", () => {
      votes = {};
      currentVoter = null;
      runoffPlaces = null;
      showResult("Votos reiniciados. ¡A votar de nuevo!");
      renderVoterChips();
      render();
    });

    modeRandomBtn.addEventListener("click", () => setMode("random"));
    modeVoteBtn.addEventListener("click", () => setMode("vote"));

    renderUsers();
    render();
  </script>
</body>
</html>
